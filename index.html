<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>TERMINAL · Mixer</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --border:rgba(138,54,236,0.20);--border2:rgba(138,54,236,0.40);
  --accent:#8a36ec;--accent2:#b06af5;
  --green:#45e68f;--amber:#f0b93a;--red:#e05252;
  --text2:rgba(255,255,255,0.55);--text3:rgba(255,255,255,0.20);
  --mono:'JetBrains Mono',monospace;
  --bg-strip:rgba(25,6,55,0.72);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;background:#0e0018;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);overflow:hidden;
}
.hidden{display:none!important}

/* ── SHELL ── */
.shell{
  position:relative;
  width:100vw;
  height:100vh;
  max-width:100vw;max-height:100vh;
}

  box-shadow:0 0 60px rgba(138,54,236,0.18);
  display:flex;flex-direction:column;
}

/* ══ EDIT VIEW ══ */
.edit-splash{
  flex:1;overflow:hidden;
  display:flex;align-items:flex-start;justify-content:flex-start;
}
.edit-splash img{
  width:100%;height:auto;opacity:0.96;
  display:block;
  -webkit-mask-image:linear-gradient(180deg,rgba(0,0,0,1) 0%,rgba(0,0,0,1) 60%,rgba(0,0,0,0.4) 80%,transparent 100%);
  mask-image:linear-gradient(180deg,rgba(0,0,0,1) 0%,rgba(0,0,0,1) 60%,rgba(0,0,0,0.4) 80%,transparent 100%);
}
.edit-logo-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 22px 28px;
  background:linear-gradient(180deg,transparent 0%,rgba(55,10,100,0.70) 30%,rgba(40,8,80,0.88) 70%,rgba(30,6,65,0.95) 100%);
  margin-top:-80px;position:relative;z-index:1;
  flex-shrink:0;gap:14px;flex-wrap:wrap;
}
.edit-logo-left{display:flex;align-items:center;gap:7px}
.fp-edit{
  width:32px;height:32px;cursor:pointer;flex-shrink:0;
  opacity:0.65;filter:sepia(1) saturate(3) hue-rotate(5deg);
  transition:opacity .2s,filter .2s;
}
.fp-edit.live{opacity:1;filter:none;animation:fp-pulse 2.5s ease-in-out infinite}
.ins-logo{height:32px;width:auto;opacity:.85;filter:brightness(1.3)}
.status-txt{font-size:13px;color:var(--amber);letter-spacing:.08em;transition:color .3s}
.status-txt.live{color:var(--green)}
.ws-input{
  background:transparent;border:none;
  border-bottom:1px solid rgba(138,54,236,0.4);
  border-radius:0;padding:4px 2px;color:rgba(255,255,255,0.65);
  font-family:var(--mono);font-size:12px;outline:none;
  transition:border-color .2s;
}
.ws-input:focus{border-bottom-color:rgba(176,106,245,0.8)}
.ws-input.connected{border-bottom-color:rgba(69,230,143,0.5)}

/* ══ LIVE VIEW ══ */
#live{flex-direction:row!important}

.bank-wrapper{display:flex;flex-direction:column;flex:1;overflow:hidden;min-width:0}
.bank-tabs{display:none!important}
.bank-tabs.visible{display:flex}
.bank-tab{padding:2px 10px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:var(--mono);font-size:8px;letter-spacing:.1em;cursor:pointer;transition:all .15s}
.bank-tab.active{border-color:rgba(176,106,245,0.8);background:rgba(138,54,236,0.15);color:rgba(176,106,245,0.8)}
.strips{
  display:flex;overflow-x:hidden;background:transparent;flex:1;align-items:stretch;
}
.strips.scrollable{
  overflow-x:scroll;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.strips.scrollable .strip{
  flex:0 0 var(--strip-w, 60px);
}
.strips.scrollable::-webkit-scrollbar{display:none;}

/* Kanaalstrip */
.strip{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:5px 3px;flex:1;min-width:0;
  border-right:1px solid rgba(138,54,236,0.18);
  background:linear-gradient(180deg,rgba(0,0,0,0.0) 0%,rgba(20,4,45,0.08) 4%,rgba(45,10,88,0.45) 16%,rgba(25,6,55,0.82) 48%,rgba(12,2,35,0.93) 100%);
  transition:background .2s;
  position:relative;overflow:hidden;
}
.strip::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:22%;
  pointer-events:none;
  background:linear-gradient(180deg,
    rgba(255,210,255,0.35) 0%,
    rgba(230,150,255,0.18) 45%,
    transparent 100%);
  z-index:0;
}
.strip > *{position:relative;z-index:1;}
.strip.muted{background:rgba(35,4,4,0.90)}
.strip.muted-by-solo{background:rgba(35,4,4,0.75)}
.strip-name{
  font-size:7px;color:var(--green);opacity:.85;
  letter-spacing:.08em;text-transform:uppercase;
  text-align:center;width:100%;overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;
}
.strip.muted .strip-name{color:var(--red);opacity:.4}

/* Geïntegreerde fader+VU */
.fvu{position:relative;cursor:pointer;touch-action:none;width:100%;flex:1;min-height:80px}
.fvu-segs{position:absolute;left:50%;top:4px;bottom:4px;transform:translateX(-50%);width:10px;display:flex;flex-direction:column-reverse;gap:1px;pointer-events:none}
.fvu-seg{flex:1;border-radius:1px;background:rgba(255,255,255,0.04);transition:background 40ms}
.fvu-thumb{
  position:absolute;left:50%;
  width:calc(100% - 4px);height:13px;
  background:linear-gradient(180deg,rgba(55,55,75,.96),rgba(32,32,47,.96) 50%,rgba(46,46,65,.96));
  border:1px solid rgba(135,135,165,.36);border-radius:3px;
  transform:translate(-50%,-50%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.7);z-index:2;
}
.fvu-line{width:60%;height:1px;background:rgba(190,190,210,.42);border-radius:1px}

/* Knob */
.knob{
  border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 38% 32%,rgba(255,255,255,.09),rgba(14,2,34,.97));
  border:1px solid rgba(69,230,143,.17);cursor:pointer;position:relative;touch-action:none;
}
.knob-wrap{padding:12px;margin:-12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;}
.knob.m{border-color:rgba(138,54,236,.28)}
.knob svg{position:absolute;top:0;left:0;pointer-events:none}
.kw{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0}
.kl{font-size:6px;color:var(--text3);letter-spacing:.06em;transform:rotate(-8deg);margin-left:1px}

/* Buttons */
.tbtn{
  height:18px;border-radius:3px;border:1px solid rgba(176,106,245,0.4);
  background:transparent;color:rgba(176,106,245,0.8);font-family:var(--mono);
  font-size:7px;cursor:pointer;transition:all .15s;touch-action:manipulation;
  flex:1;
}
.tbtn.mute-on{border-color:var(--amber);background:rgba(240,185,58,.14);color:var(--amber)}
.tbtn.solo-on{border-color:var(--green);background:rgba(69,230,143,.11);color:var(--green)}
.ms-row{display:flex;gap:2px;width:100%;flex-shrink:0}
.ch-num{font-size:6px;color:var(--text3);flex-shrink:0}

/* Verticale divider */
.vdiv{
  width:62px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;
  background:linear-gradient(180deg,rgba(0,0,0,0.0) 0%,rgba(20,4,45,0.08) 4%,rgba(45,10,88,0.45) 16%,rgba(25,6,55,0.82) 48%,rgba(12,2,35,0.93) 100%);
  border-left:1px solid rgba(138,54,236,.2);
  border-right:1px solid rgba(138,54,236,.2);
  overflow:hidden;
  padding:0 0 5px 0;gap:4px;
  position:relative;
}
.vdiv>*{position:relative;z-index:1;}
.vdiv-splash{
  flex:1;overflow:hidden;
  display:flex;align-items:flex-start;justify-content:center;
  position:relative;
}
.bank-badge{
  position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
  font-size:6px;color:rgba(176,106,245,0.7);letter-spacing:.08em;
  background:rgba(12,2,35,0.85);padding:1px 5px;border-radius:2px;
  border:1px solid rgba(176,106,245,0.2);
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;
}
.bank-badge.visible{opacity:1;}
.vdiv-splash img{
  width:100%;height:auto;opacity:0.85;
  flex-shrink:0;
  -webkit-mask-image:linear-gradient(90deg,transparent 0%,rgba(0,0,0,1) 6%,rgba(0,0,0,1) 94%,transparent 100%);
  mask-image:linear-gradient(90deg,transparent 0%,rgba(0,0,0,1) 6%,rgba(0,0,0,1) 94%,transparent 100%);
}
.vdiv-bottom{
  display:flex;align-items:center;gap:4px;flex-shrink:0;padding-bottom:2px;
}
.fp-live{width:20px;height:20px;cursor:pointer;opacity:0.6;filter:sepia(1) saturate(3) hue-rotate(5deg);transition:opacity .2s,filter .2s}
.fp-live.live{opacity:1;filter:none;animation:fp-pulse 2.5s ease-in-out infinite}
.ins-sm{height:13px;width:auto;opacity:.45;filter:brightness(1.2)}

/* Master strip */
.master-strip{
  width:90px;flex-shrink:0;
}
.master-strip.muted{
  background:rgba(35,4,4,0.90)!important;
}
.master-strip{
  display:flex;flex-direction:column;align-items:center;
  gap:4px;padding:5px 4px;
  background:linear-gradient(180deg,rgba(20,4,45,0.10) 0%,rgba(40,10,80,0.35) 6%,rgba(55,12,95,0.60) 14%,rgba(25,6,55,0.82) 45%,rgba(12,2,35,0.92) 100%);
  border-left:1px solid rgba(138,54,236,.25);

  position:relative;overflow:hidden;
}
.master-strip::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:22%;
  pointer-events:none;
  background:linear-gradient(180deg,
    rgba(255,210,255,0.35) 0%,
    rgba(230,150,255,0.18) 45%,
    transparent 100%);
  z-index:0;
}
.master-strip>*{position:relative;z-index:1;}
.master-lbl{font-size:7px;color:var(--amber);letter-spacing:.12em;flex-shrink:0;order:10;}

@keyframes fp-pulse{0%,100%{opacity:1;filter:drop-shadow(0 0 4px #45e68f)}50%{opacity:.55;filter:drop-shadow(0 0 1px #45e68f)}}

.knob-popup{
  position:fixed;z-index:9999;
  background:rgba(15,4,35,0.96);
  border:1px solid rgba(138,54,236,0.35);
  border-radius:8px;padding:14px 20px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  box-shadow:0 4px 24px rgba(0,0,0,0.6);
}
.knob-popup.hidden{display:none}
.knob-popup-label{font-size:8px;letter-spacing:.12em;color:rgba(255,255,255,0.4);font-family:var(--mono)}
.knob-popup-val{font-size:11px;letter-spacing:.08em;font-family:var(--mono);color:rgba(255,255,255,0.7)}
.popup-fader-h{
  -webkit-appearance:none;appearance:none;
  width:280px;height:20px;background:transparent;cursor:pointer;outline:none;
}
.popup-fader-h::-webkit-slider-runnable-track{height:3px;background:rgba(138,54,236,0.3);border-radius:2px}
.popup-fader-h::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:20px;background:rgba(69,230,143,0.8);border-radius:3px;margin-top:-9px}
.popup-fader-v{
  -webkit-appearance:none;appearance:none;
  writing-mode:vertical-lr;direction:rtl;
  width:24px;height:240px;background:transparent;cursor:pointer;outline:none;
}
.popup-fader-v::-webkit-slider-runnable-track{width:3px;background:rgba(138,54,236,0.3);border-radius:2px}
.popup-fader-v::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:14px;background:rgba(138,54,236,0.8);border-radius:3px;margin-left:-11px}
</style>

<script>
var channels=[],master={vol:.8,pan:.5,fxReturn:0},masterVu=-60,masterVuL=-60,masterVuR=-60;
var ws=null,rt=null,currentBank='a',sessionName='default';

// ── LocalStorage helpers ──────────────────────────────────────────────────
function lsKey(k){return 'touchlab_'+sessionName+'_'+k;}
function lsSave(k,v){try{localStorage.setItem(lsKey(k),JSON.stringify(v));}catch(e){}}
function lsLoad(k,def){try{var v=localStorage.getItem(lsKey(k));return v!==null?JSON.parse(v):def;}catch(e){return def;}}

function saveChannel(ch){
  lsSave('ch_'+ch.index,{vol:ch.vol,pan:ch.pan,fx:ch.fx,mute:ch.mute,solo:ch.solo});
}
function saveMaster(){
  lsSave('master',{vol:master.vol,pan:master.pan,fxReturn:master.fxReturn});
}
function loadChannelMemory(ch){
  var m=lsLoad('ch_'+ch.index,null);
  if(m){ch.vol=m.vol!==undefined?m.vol:ch.vol;ch.pan=m.pan!==undefined?m.pan:ch.pan;ch.fx=m.fx!==undefined?m.fx:ch.fx;ch.mute=m.mute!==undefined?m.mute:ch.mute;ch.solo=m.solo!==undefined?m.solo:ch.solo;}
}
function loadMasterMemory(){
  var m=lsLoad('master',null);
  if(m) return {vol:m.vol||0.8,pan:m.pan||0.5,fxReturn:m.fxReturn||0};
  return null;
}
const SEGS=22,BANK_SIZE=10,PAD=4;

// ── Verbinding ─────────────────────────────────────────────────────────────
function connect(url){
  if(ws)ws.close();clearTimeout(rt);
  ws=new WebSocket(url);
  ws.onopen=()=>setStatus(true);
  ws.onclose=()=>{setStatus(false);rt=setTimeout(()=>connect(document.getElementById('ws-url').value),2000)};
  ws.onmessage=(e)=>{
    var msg=JSON.parse(e.data);
    if(msg.type==='init'){
      sessionName=msg.session||'default';
      channels=msg.channels.map(c=>({...c,vol:0,pan:0.5,fx:0,vu:-60}));
      channels.forEach(loadChannelMemory);
      var mm=loadMasterMemory();
      master={vol:0,pan:mm?mm.pan:0.5,fxReturn:mm?mm.fxReturn:0};
      renderAll();
      // Sessienaam direct in DOM zetten
      var sn=document.getElementById('session-name');
      if(sn&&sessionName!=='default') sn.textContent=sessionName;
      var st=document.getElementById('status-edit');
      if(st){st.className='status-txt live';st.textContent='LIVE · '+channels.length+' CH';}
      document.getElementById('ws-url').className='ws-input connected';
      var fe=document.getElementById('fp-edit');if(fe)fe.className='fp-edit live';
      return}
    if(msg.type==='vu'){masterVu=msg.masterVu||-60;(msg.channels||[]).forEach(u=>{var c=channels.find(x=>x.index===u.index);if(c)c.vu=u.vu});updateVUs();return}
    var ch=channels.find(c=>c.index===msg.channel);
    if(ch){
      if(msg.type==='volume'){ch.vol=msg.value;setFP(ch.index,ch.vol)}
      if(msg.type==='pan'){ch.pan=msg.value;setKV('kn-'+ch.index+'-pan',msg.value,22)}
      if(msg.type==='mute'){ch.mute=msg.value;applyMute(ch)}
      if(msg.type==='solo'){ch.solo=msg.value;applySolo(ch)}
    }
    if(msg.type==='masterVol'){master.vol=msg.value;setFP('m',master.vol)}
    if(msg.type==='masterPan'){master.pan=msg.value;setKV('kn-m-pan',master.pan,26)}
    if(msg.type==='fxReturn'){master.fxReturn=msg.value;setKV('kn-m-fx',master.fxReturn,26)}
  }
}
function reconnect(){connect(document.getElementById('ws-url').value)}
function send(obj){if(ws&&ws.readyState===1)ws.send(JSON.stringify(obj))}
function setStatus(live){
  var s=document.getElementById('status-edit');
  s.className='status-txt'+(live?' live':'');
  s.textContent=live?('LIVE · '+channels.length+' CH'):'OFFLINE · ENTER om te verbinden';
  document.getElementById('ws-url').className='ws-input'+(live?' connected':'');
  var fe=document.getElementById('fp-edit');if(fe)fe.className='fp-edit'+(live?' live':'');
  var fl=document.getElementById('fp-live');if(fl)fl.className='fp-live'+(live?' live':'');
  var sn=document.getElementById('session-name');
  if(sn) sn.textContent=live&&sessionName&&sessionName!=='default'?sessionName:'';
}

// ── Edit ↔ Live ─────────────────────────────────────────────────────────────
function goLive(){
  document.getElementById('edit').classList.add('hidden');
  document.getElementById('live').classList.remove('hidden');
  renderStrips();
  buildMasterFader();
  initDividerKnobs();
  initSwipe();
}
function initSwipe(){
  var el=document.getElementById('strips');
  if(!el||el._swipe) return;
  el._swipe=true;
  var sx=0,sy=0,scrollStart=0,isSwipe=false,decided=false;
  el.addEventListener('touchstart',function(e){
    sx=e.touches[0].clientX;
    sy=e.touches[0].clientY;
    scrollStart=el.scrollLeft;
    isSwipe=false;decided=false;
  },{passive:true});
  el.addEventListener('touchmove',function(e){
    var dx=e.touches[0].clientX-sx;
    var dy=e.touches[0].clientY-sy;
    if(!decided){
      // Bepaal richting na 8px beweging
      if(Math.abs(dx)>8||Math.abs(dy)>8){
        decided=true;
        isSwipe=Math.abs(dx)>Math.abs(dy)*0.8;
      }
    }
    if(isSwipe){
      e.preventDefault();
      el.scrollLeft=scrollStart-dx;
    }
    // Verticaal: fader handelt zelf, geen preventDefault nodig
  },{passive:false});
  // Badge update bij scrollen
  el.addEventListener('scroll',function(){
    if(channels.length<=10) return;
    var badge=document.getElementById('bank-badge');
    if(!badge) return;
    var stripW=el.scrollWidth/Math.max(channels.length,10);
    var visibleStart=Math.floor(el.scrollLeft/stripW)+1;
    var visibleEnd=Math.min(visibleStart+9,channels.length);
    badge.textContent=visibleStart+'–'+visibleEnd;
    badge.className='bank-badge visible';
  },{passive:true});
}
function goEdit(){
  document.getElementById('live').classList.add('hidden');
  document.getElementById('edit').classList.remove('hidden');
}

// ── Bank ───────────────────────────────────────────────────────────────────
function setBank(b){
  currentBank=b;
  document.getElementById('tab-a').className='bank-tab'+(b==='a'?' active':'');
  document.getElementById('tab-b').className='bank-tab'+(b==='b'?' active':'');
  renderStrips();
  // Update badge
  var badge=document.getElementById('bank-badge');
  if(badge){
    badge.textContent='BANK '+(b==='a'?'A':'B');
    badge.className='bank-badge'+(channels.length>10?' visible':'');
  }
  // Cursor tonen als >10 kanalen
  var vs=document.getElementById('vdiv-splash');
  if(vs) vs.style.cursor=channels.length>10?'pointer':'default';
}
function recallChannels(){
  var btn=document.getElementById('btn-recall-ch');
  channels.forEach(function(ch){
    var m=lsLoad('ch_'+ch.index,null);
    if(m){
      ch.vol=m.vol!==undefined?m.vol:0;
      ch.pan=m.pan!==undefined?m.pan:0.5;
      ch.fx=m.fx!==undefined?m.fx:0;
      ch.mute=m.mute||false;
      ch.solo=m.solo||false;
      send({type:'volume',channel:ch.index,value:ch.vol});
      send({type:'pan',channel:ch.index,value:ch.pan});
      send({type:'fx',channel:ch.index,value:ch.fx});
      send({type:'mute',channel:ch.index,value:ch.mute});
    }
  });
  renderStrips();
  updateStripColors();
  if(btn){btn.style.background='rgba(69,230,143,0.2)';btn.style.borderColor='rgba(69,230,143,0.8)';}
}
function recallMaster(){
  var m=loadMasterMemory();
  if(!m) return;
  master.vol=m.vol;master.pan=m.pan;master.fxReturn=m.fxReturn;
  send({type:'masterVol',value:master.vol});
  send({type:'masterPan',value:master.pan});
  send({type:'fxReturn',value:master.fxReturn});
  buildMasterFader();initDividerKnobs();
  var btn=document.getElementById('btn-recall-m');

// ── Fader+VU ───────────────────────────────────────────────────────────────
function mkFVU(id,val,H,noint,cb){
  var wrap=document.createElement('div');
  wrap.className='fvu'+(noint?' noint':'');
  wrap.style.width='100%';
  if(H&&H>50)wrap.style.height=H+'px';
  var segs=document.createElement('div');segs.className='fvu-segs';segs.id='sg-'+id;
  for(var i=0;i<SEGS;i++){var s=document.createElement('div');s.className='fvu-seg';segs.appendChild(s)}
  var thumb=document.createElement('div');thumb.className='fvu-thumb';thumb.id='th-'+id;
  var line=document.createElement('div');line.className='fvu-line';thumb.appendChild(line);
  wrap.appendChild(segs);wrap.appendChild(thumb);
  function getR(){var h=wrap.clientHeight||parseInt(wrap.style.height)||200;return h-PAD*2-13}
  function setThumb(v){var R=getR();thumb.style.top=((1-v)*R+PAD+6.5)+'px';}
  requestAnimationFrame(()=>requestAnimationFrame(()=>setThumb(val)));
  if(noint) return wrap;
  var drag=false,sy=0,sv=val;
  function dn(y){drag=true;sy=y;var R=getR();sv=1-(parseFloat(thumb.style.top)-PAD-6.5)/R}
  function mv(y){if(!drag)return;var R=getR();var v=Math.max(0,Math.min(1,sv+(sy-y)/R));setThumb(v);if(cb)cb(v)}
  wrap.addEventListener('mousedown',e=>{dn(e.clientY);e.preventDefault()});
  wrap.addEventListener('touchstart',e=>{dn(e.touches[0].clientY);e.preventDefault()},{passive:false});
  window.addEventListener('mousemove',e=>mv(e.clientY));
  window.addEventListener('touchmove',e=>{if(drag){mv(e.touches[0].clientY);e.preventDefault()}},{passive:false});
  window.addEventListener('mouseup',()=>drag=false);window.addEventListener('touchend',()=>drag=false);
  return wrap;
}
function setFP(id,v){
  var th=document.getElementById('th-'+id);if(!th)return;
  var wrap=th.parentElement;
  var H=wrap.clientHeight||parseInt(wrap.style.height)||200;var R=H-PAD*2-13;
  th.style.top=((1-v)*R+PAD+6.5)+'px';
}
function dbP(db){return Math.max(0,Math.min(100,((db+60)/60)*100))}
function vuC(p){return p>90?'#e05252':p>72?'#f0b93a':'#45e68f'}
function updSG(id,db){
  var sg=document.getElementById('sg-'+id);if(!sg)return;
  var p=dbP(db);
  sg.querySelectorAll('.fvu-seg').forEach((s,i)=>{var sp=((i+1)/SEGS)*100;s.style.background=sp<=p?vuC(sp):'rgba(255,255,255,0.05)'});
}
function updateVUs(){
  channels.forEach(c=>updSG(c.index,c.mute?-60:c.vu));
  updSG('ml',dbP(masterVuL||masterVu)/100*60-60);
  updSG('m',masterVu);
  updSG('mr',dbP(masterVuR||masterVu)/100*60-60);
}

// ── Knob ───────────────────────────────────────────────────────────────────
function initK(el,val,size,cb,color){
  var clr=color||'green';
  var strokeColor=clr==='purple'?'var(--accent2)':clr==='amber'?'var(--amber)':'var(--green)';
  var borderColor=clr==='purple'?'rgba(138,54,236,0.28)':clr==='amber'?'rgba(240,185,58,0.35)':'rgba(69,230,143,0.22)';
  el.style.borderColor=borderColor;
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',size);svg.setAttribute('height',size);
  var ln=document.createElementNS('http://www.w3.org/2000/svg','line');
  ln.setAttribute('stroke',strokeColor);
  ln.setAttribute('stroke-width','1.5');ln.setAttribute('stroke-linecap','round');
  svg.appendChild(ln);el.appendChild(svg);setKL(ln,val,size);
  var drag=false,sy=0,sv=val;
  el.addEventListener('mousedown',e=>{drag=true;sy=e.clientY;sv=val;e.preventDefault()});
  el.addEventListener('touchstart',e=>{drag=true;sy=e.touches[0].clientY;sv=val;e.preventDefault()},{passive:false});
  window.addEventListener('mousemove',e=>{if(!drag)return;val=Math.max(0,Math.min(1,sv+(sy-e.clientY)/120));setKL(ln,val,size);if(cb)cb(val)});
  window.addEventListener('touchmove',e=>{if(!drag)return;val=Math.max(0,Math.min(1,sv+(sy-e.touches[0].clientY)/120));setKL(ln,val,size);if(cb)cb(val)},{passive:false});
  window.addEventListener('mouseup',()=>drag=false);window.addEventListener('touchend',()=>drag=false);
  // Dubbeltap/dubbelklik → reset naar default
  var lastTap=0;
  var def=el.dataset.default!==undefined?parseFloat(el.dataset.default):0;
  function resetK(e){e.preventDefault();e.stopPropagation();val=def;setKL(ln,val,size);if(cb)cb(val);}
  el.addEventListener('dblclick',function(e){e.stopPropagation();resetK(e);});
  el.addEventListener('touchend',function(e){
    if(drag)return;
    var now=Date.now();
    if(now-lastTap<350){e.preventDefault();e.stopPropagation();resetK(e);}
    lastTap=now;
  });
}
function setKL(ln,v,size){
  var a=(-135+v*270)*Math.PI/180,cx=size/2,r=size*.33;
  ln.setAttribute('x1',cx);ln.setAttribute('y1',cx);
  ln.setAttribute('x2',cx+Math.cos(a-Math.PI/2)*r);ln.setAttribute('y2',cx+Math.sin(a-Math.PI/2)*r);
}
function setKV(id,v,size){var k=document.getElementById(id);if(!k)return;var l=k.querySelector('line');if(l)setKL(l,v,size)}

// ── Knob popup ─────────────────────────────────────────────────────────────
var popupTarget=null,popupCb=null,popupType=null;

function showKnobPopup(el,type,val,cb){
  var popup=document.getElementById('knob-popup');
  var fader=document.getElementById('popup-fader');
  var label=document.getElementById('popup-label');
  var valEl=document.getElementById('popup-val');
  popupTarget=el;popupCb=cb;popupType=type;

  label.textContent=type==='pan'?'PAN':'FX';
  label.style.color=type==='pan'?'rgba(69,230,143,0.7)':'rgba(176,106,245,0.8)';

  if(type==='pan'){
    fader.className='popup-fader-h';
    fader.style.cssText='width:280px;height:20px;writing-mode:initial;direction:initial';
    fader.value=Math.round(val*100);
    updatePopupVal(val,type);
  } else {
    fader.className='popup-fader-v';
    fader.style.cssText='writing-mode:vertical-lr;direction:rtl;width:24px;height:240px';
    fader.value=Math.round(val*100);
    updatePopupVal(val,type);
  }

  // Positie naast knob
  var r=el.getBoundingClientRect();
  popup.classList.remove('hidden');
  var pw=popup.offsetWidth,ph=popup.offsetHeight;
  var left=Math.min(r.left,window.innerWidth-pw-8);
  var top=Math.max(8,r.top-ph-8);
  popup.style.left=left+'px';
  popup.style.top=top+'px';

  fader.oninput=function(){
    var v=parseInt(fader.value)/100;
    updatePopupVal(v,type);
    if(popupCb)popupCb(v);
  };
  // Dblclick/dubbeltap op waarde → reset
  var valEl=document.getElementById('popup-val');
  valEl.ondblclick=function(){
    var def=type==='pan'?50:0;
    fader.value=def;var v=def/100;
    updatePopupVal(v,type);if(popupCb)popupCb(v);
  };
  var pvLastTap=0;
  valEl.ontouchend=function(e){
    var now=Date.now();
    if(now-pvLastTap<350){valEl.ondblclick();e.preventDefault();}
    pvLastTap=now;
  };
  // Dubbeltap op popup fader → reset
  var popLastTap=0;
  fader.addEventListener('touchend',function(e){
    var now=Date.now();
    if(now-popLastTap<350){
      var def=type==='pan'?50:0;
      fader.value=def;
      var v=def/100;
      updatePopupVal(v,type);
      if(popupCb)popupCb(v);
    }
    popLastTap=now;
  });
  fader.addEventListener('dblclick',function(){
    var def=type==='pan'?50:0;
    fader.value=def;
    var v=def/100;
    updatePopupVal(v,type);
    if(popupCb)popupCb(v);
  });
}

function updatePopupVal(v,type){
  var el=document.getElementById('popup-val');
  if(type==='pan'){
    var pct=Math.round((v-.5)*200);
    el.style.color='rgba(69,230,143,0.7)';
    el.textContent=pct===0?'C':pct>0?'R'+pct:'L'+Math.abs(pct);
  } else {
    el.style.color='rgba(176,106,245,0.8)';
    el.textContent=Math.round(v*100)+'%';
  }
}

function hideKnobPopup(){
  document.getElementById('knob-popup').classList.add('hidden');
  popupTarget=null;
}

// Tik buiten knob sluit popup
document.addEventListener('click',function(e){
  var popup=document.getElementById('knob-popup');
  if(popup.classList.contains('hidden'))return;
  // Klik buiten popup → sluit
  if(!popup.contains(e.target)){hideKnobPopup();return;}
});

// popup-val dblclick reset wordt ingesteld in showKnobPopup

// Override initK click voor channel knobs — open popup bij single click
function attachPopup(el,type,getCb,setCb){
  function openPopup(e){
    e.stopPropagation();
    var val=parseFloat(el.dataset.currentVal||el.dataset.default||'0.5');
    showKnobPopup(el,type,val,function(v){
      el.dataset.currentVal=v;
      setCb(v);
    });
  }
  var overlay=document.createElement('div');
  overlay.style.cssText='position:absolute;top:-10px;left:-10px;right:-10px;bottom:-10px;z-index:2;cursor:pointer;';
  el.style.position='relative';
  el.appendChild(overlay);
  // Desktop: klik opent popup
  overlay.addEventListener('click',function(e){
    if(el.dataset.wasDragged==='1'){el.dataset.wasDragged='0';return;}
    openPopup(e);
  });
  // Mobiel: touchstart → touchend zonder beweging opent popup
  var tStartX,tStartY,tMoved;
  var oLastTap=0;
  overlay.addEventListener('touchstart',function(e){
    tStartX=e.touches[0].clientX;tStartY=e.touches[0].clientY;tMoved=false;
  },{passive:true});
  overlay.addEventListener('touchmove',function(e){
    if(Math.abs(e.touches[0].clientX-tStartX)>6||Math.abs(e.touches[0].clientY-tStartY)>6) tMoved=true;
  },{passive:true});
  overlay.addEventListener('touchend',function(e){
    if(tMoved)return;
    e.preventDefault();
    var now=Date.now();
    if(now-oLastTap<350){
      // Dubbeltap → reset naar default
      var def=parseFloat(el.dataset.default||'0');
      el.dataset.currentVal=def;
      var ln2=el.querySelector('line');
      if(ln2)setKL(ln2,def,parseInt(el.style.width)||22);
      setCb(def);
      oLastTap=0;return;
    }
    oLastTap=now;
    openPopup(e);
  },{passive:false});
}


function scaleSplashLogo(){
  var splash=document.getElementById('vdiv-splash');
  if(!splash) return;
  var img=splash.querySelector('img');
  if(!img) return;
  var h=splash.offsetHeight;
  if(h>20){
    // Na rotate(-90deg): visuele breedte = originele hoogte
    // Stel height in (originele dimensie) zodat visuele breedte=containerh
    img.style.height=Math.round(h*0.90)+'px';
    img.style.width='auto';
  }
}
function scaleSplashLogoRAF(){
  requestAnimationFrame(function(){
    scaleSplashLogo();
    setTimeout(scaleSplashLogo,150);
  });
}
window.addEventListener('resize',scaleSplashLogoRAF);
window.addEventListener('orientationchange',function(){setTimeout(scaleSplashLogo,300);});

</script>
